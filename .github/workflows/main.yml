name: Build Real IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract Source
        run: tar -xzf ios_source.tar.gz
        
      - name: Build and Sign (Ad-Hoc)
        run: |
          # 1. Find the project file
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJECT" | awk '/Schemes:/{f=1;next}f' | xargs | cut -d' ' -f1)
          
          # 2. Compile the code into a real app binary
          xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" \
          -archivePath build/OpaqueAi.xcarchive \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          
          # 3. Package it into an IPA
          mkdir -p build/Payload
          cp -r build/OpaqueAi.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r ../OpaqueAi_Real.ipa Payload
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Real-IPA-File
          path: OpaqueAi_Real.ipa
